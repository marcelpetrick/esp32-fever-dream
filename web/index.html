<!doctype html>
<html lang="en" data-mode="auto" data-theme="ember">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light dark">
    <title>ESP32 Temperature Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="app-header">
        <div>
            <p class="eyebrow">Local sensor</p>
            <h1>Temperature</h1>
        </div>
        <div class="toolbar" aria-label="Display settings">
            <label class="select-field">
                <span>Mode</span>
                <select id="modeSelect" autocomplete="off">
                    <option value="auto">Auto</option>
                    <option value="light">Light</option>
                    <option value="dark">Dark</option>
                </select>
            </label>
            <label class="select-field">
                <span>Theme</span>
                <select id="themeSelect" autocomplete="off">
                    <option value="ember">Ember</option>
                    <option value="forest">Forest</option>
                    <option value="mono">Mono</option>
                </select>
            </label>
        </div>
    </header>

    <main class="dashboard" aria-live="polite">
        <section class="current-panel" aria-labelledby="currentTitle">
            <div>
                <p class="eyebrow" id="currentTitle">Current reading</p>
                <div class="temperature-row">
                    <span id="currentTemp" class="temperature">--.-</span>
                    <span class="unit">°C</span>
                </div>
                <p id="currentMeta" class="muted">Waiting for first reading</p>
            </div>
            <div id="statusBadge" class="status-badge status-unknown">Unknown</div>
        </section>

        <section class="chart-panel" aria-labelledby="chartTitle">
            <div class="section-head">
                <div>
                    <p class="eyebrow" id="chartTitle">History</p>
                    <h2>Last 1,440 readings</h2>
                </div>
                <div id="chartSummary" class="muted">No samples loaded</div>
            </div>
            <canvas id="historyChart" width="960" height="320" aria-label="Temperature history chart"></canvas>
        </section>

        <section class="stream-panel panel" aria-labelledby="streamTitle">
            <div class="section-head">
                <div>
                    <p class="eyebrow" id="streamTitle">Live camera</p>
                    <h2>Debug stream</h2>
                </div>
                <div id="streamState" class="api-state">Idle</div>
            </div>
            <div class="stream-controls">
                <label class="input-field">
                    <span>Device</span>
                    <input id="deviceInput" type="text" autocomplete="off" placeholder="esp32-fever-dream">
                </label>
                <button id="connectButton" class="text-button" type="button">Connect</button>
                <button id="snapshotButton" class="text-button" type="button">Snapshot</button>
            </div>
            <div class="stream-frame">
                <img id="liveImage" alt="Live ESP32-CAM capture">
            </div>
            <p id="streamMeta" class="muted">Add <code>?device=esp32-fever-dream</code> or connect manually.</p>
        </section>

        <section class="grid">
            <article class="panel" aria-labelledby="statusTitle">
                <div class="section-head">
                    <div>
                        <p class="eyebrow" id="statusTitle">Device</p>
                        <h2>Status</h2>
                    </div>
                    <button id="refreshButton" class="icon-button" type="button" title="Refresh now" aria-label="Refresh now">↻</button>
                </div>
                <dl id="statusList" class="details"></dl>
            </article>

            <article class="panel" aria-labelledby="diagnosticsTitle">
                <div class="section-head">
                    <div>
                        <p class="eyebrow" id="diagnosticsTitle">Runtime</p>
                        <h2>Diagnostics</h2>
                    </div>
                    <div id="apiState" class="api-state">Idle</div>
                </div>
                <dl id="diagnosticsList" class="details"></dl>
            </article>
        </section>
    </main>

    <script src="app.js" defer></script>
</body>
</html>
